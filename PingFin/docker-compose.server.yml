version: '3.8'

services:
  app:
    build: .
    container_name: ${APP_CONTAINER_NAME}
    ports:
      - "${APP_PORT}:80"
    environment:
      PORT: 80
      DB_HOST: ${DB_HOST}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
      DB_PORT: ${DB_PORT}
      TEAM_NAME: ${TEAM_NAME}
      TEAM_BIC: ${TEAM_BIC}
      TEAM_MEMBERS: ${TEAM_MEMBERS}
      OTHER_BANK_BIC: ${OTHER_BANK_BIC}
      OTHER_BANK_NAME: ${OTHER_BANK_NAME}
      CB_API_BASE_URL: ${CB_API_BASE_URL}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - pingfin_net
      - internal

  db:
    image: mysql:8.0
    container_name: ${DB_CONTAINER_NAME}
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
    volumes:
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro
      - bankkbc_mysql_data:/var/lib/mysql
    networks:
      - internal
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_PASSWORD}"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  bankkbc_mysql_data:

networks:
  pingfin_net:
    external: true
  internal:
    driver: bridge
